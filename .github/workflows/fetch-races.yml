name: Fetch Upcoming Races

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9am UTC
    - cron: '0 9 * * 4'   # Every Thursday 9am UTC
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  fetch-races:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch races from RunSignup API (unauthenticated)
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import math
          from datetime import datetime, timedelta

          # Fairfield CT coords
          HOME_LAT, HOME_LON = 41.1409, -73.2637

          # Zip code → lat/lon lookup (covers CT/NY/MA race area)
          ZIP_COORDS = {
            '06825':(41.1409,-73.2637),'06820':(41.0762,-73.4618),'06840':(41.1290,-73.4801),
            '06880':(41.1415,-73.3579),'06897':(41.2015,-73.3845),'06851':(41.1220,-73.4079),
            '06902':(41.0534,-73.5387),'06830':(41.0262,-73.6282),'06460':(41.2223,-73.0566),
            '06510':(41.3081,-72.9282),'06604':(41.1865,-73.1952),'06605':(41.1726,-73.2079),
            '06606':(41.1976,-73.2218),'06611':(41.2512,-73.0929),'06614':(41.2165,-73.1368),
            '06702':(41.5584,-73.0512),'06704':(41.5762,-73.0290),'06708':(41.5248,-73.0740),
            '06401':(41.3401,-73.0651),'06410':(41.5051,-72.8904),'06450':(41.5362,-72.7918),
            '06457':(41.5623,-72.6512),'06468':(41.3329,-73.1040),'06470':(41.3748,-73.2290),
            '06482':(41.3901,-73.2240),'06484':(41.3065,-73.1368),'06492':(41.4573,-72.8240),
            '10001':(40.7484,-73.9967),'10036':(40.7590,-73.9845),'10306':(40.5565,-74.1596),
            '10541':(41.3887,-73.7401),'10543':(40.9562,-73.7290),'10580':(40.9834,-73.6734),
            '10601':(41.0334,-73.7929),'10701':(40.9262,-73.8985),'10801':(40.9112,-73.7834),
            '10804':(40.9534,-73.7818),'01060':(42.3237,-72.6357),'01101':(42.1015,-72.5898),
          }

          def haversine(lat1, lon1, lat2, lon2):
            R = 3958.8
            dlat = math.radians(lat2 - lat1)
            dlon = math.radians(lon2 - lon1)
            a = math.sin(dlat/2)**2 + math.cos(math.radians(lat1)) * math.cos(math.radians(lat2)) * math.sin(dlon/2)**2
            return R * 2 * math.atan2(math.sqrt(a), math.sqrt(1-a))

          zipcode  = '06825'
          radius   = 50   # fetch 50mi max — UI filters client-side by 15/25/50

          today    = datetime.utcnow().strftime('%Y-%m-%d')
          end_date = (datetime.utcnow() + timedelta(days=180)).strftime('%Y-%m-%d')

          params = urllib.parse.urlencode({
            'format':           'json',
            'zipcode':          zipcode,
            'radius':           radius,
            'start_date':       today,
            'end_date':         end_date,
            'events':           'T',
            'sort':             'date ASC',
            'results_per_page': 200,
            'page':             1,
          })

          url = 'https://api.runsignup.com/rest/races?' + params
          print(f"Fetching: {url}")

          req = urllib.request.Request(url, headers={'User-Agent': 'RaceFinderBot/1.0'})

          with urllib.request.urlopen(req, timeout=30) as resp:
            raw = resp.read().decode()
            print(f"Response status: {resp.status}")
            print(f"Response preview: {raw[:500]}")
            data = json.loads(raw)

          # Check for error response
          if 'error' in data:
            raise Exception(f"API error: {data['error']}")

          races_raw = data.get('races', [])
          print(f"Found {len(races_raw)} races")
          races = []

          for item in races_raw:
            r = item.get('race', item)

            # Skip drafts and private races
            if r.get('is_draft_race') == 'T' or r.get('is_private_race') == 'T':
              continue

            next_date = r.get('next_date', '')

            events = r.get('events', [])
            distances = list(dict.fromkeys(
              e.get('distance', '') for e in events
              if e.get('distance') and e.get('volunteer') != 'T'
            ))

            # Calculate distance from Fairfield CT
            distance_mi = None
            race_zip = r.get('address', {}).get('zipcode', '').strip().split('-')[0]
            if race_zip in ZIP_COORDS:
              coords = ZIP_COORDS[race_zip]
              distance_mi = round(haversine(HOME_LAT, HOME_LON, coords[0], coords[1]))

            races.append({
              'id':          r.get('race_id', ''),
              'name':        r.get('name', ''),
              'date':        next_date,
              'city':        r.get('address', {}).get('city', ''),
              'state':       r.get('address', {}).get('state', ''),
              'zipcode':     race_zip,
              'distance_mi': distance_mi,
              'distances':   distances,
              'url':         r.get('url', ''),
              'logo':        r.get('logo_url', ''),
              'reg_open':    r.get('is_registration_open', 'F'),
            })

          output = {
            'generated': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'zipcode':   zipcode,
            'radius_mi': radius,
            'count':     len(races),
            'races':     races,
          }

          with open('races.json', 'w') as f:
            json.dump(output, f, indent=2)

          print(f"Wrote {len(races)} races to races.json")
          EOF

      - name: Commit races.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add races.json
          git diff --staged --quiet || git commit -m "chore: refresh races.json [skip ci]"
          git push
